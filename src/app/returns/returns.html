<div class="container-fluid py-4 px-3">
  <!-- Returns Card -->
  <div class="crm-card">
    <div class="crm-card-header">
      <div class="row align-items-center g-3">
        <div class="col-md-auto">
          <h6 class="mb-0 fw-bold text-main">Returns Tracking</h6>
        </div>
        <div class="col-md">
          <div class="stylish-search float-end" style="max-width: 400px">
            <i class="mdi mdi-magnify"></i>
            <input
              type="text"
              class="form-control ps-5"
              placeholder="Search by return number or product..."
              [(ngModel)]="searchText"
              name="searchText"
            />
          </div>
        </div>
        <div class="col-md-auto">
          <button
            class="btn btn-primary d-flex align-items-center shadow-sm btn-sm fw-bold px-3 py-2"
            (click)="openReturnModal()"
          >
            <i class="mdi mdi-keyboard-return me-2"></i> RECORD RETURN
          </button>
        </div>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="crm-table">
          <thead>
            <tr>
              <th>Return Number</th>
              <th>Product</th>
              <th>Quantity Returned</th>
              <th>Reason</th>
              <th>Return Date</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let ret of filteredReturns; let i = index">
              <td>
                <div class="d-flex align-items-center">
                  <div
                    class="company-avatar me-3 bg-danger-subtle text-danger rounded d-flex align-items-center justify-content-center"
                    style="width: 32px; height: 32px"
                  >
                    <i class="mdi mdi-assignment-return-outline fs-6"></i>
                  </div>
                  <div>
                    <div class="fw-semibold fs-7 text-main">{{ ret.returnNumber }}</div>
                    <span class="text-muted fs-8">ID: #{{ ret.id }}</span>
                  </div>
                </div>
              </td>
              <td>
                <span class="fw-semibold text-main">{{ ret.product }}</span>
              </td>
              <td>
                <span class="badge-crm badge-crm-danger">{{ ret.quantity }}</span>
              </td>
              <td>
                <span class="badge-crm badge-crm-secondary">{{ ret.reason }}</span>
              </td>
              <td>
                <span class="text-muted fs-7">{{ ret.date }}</span>
              </td>
              <td class="text-end pe-4">
                <button class="btn btn-outline-danger btn-sm border-0 p-1" (click)="deleteReturn(ret.id)">
                  <i class="mdi mdi-delete-outline fs-5"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filteredReturns.length === 0">
              <td colspan="6" class="text-center py-5 text-muted">
                <i class="mdi mdi-layers-off-outline fs-1 d-block mb-2 opacity-25"></i>
                No return entries recorded.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Return Modal -->
<div id="returnModal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-bottom py-3">
        <h5 class="modal-title fw-bold">
          <i class="mdi mdi-keyboard-return me-2 text-danger"></i>
          Record Product Return
        </h5>
        <button type="button" class="btn-close" (click)="closeReturnModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form #returnForm="ngForm" (ngSubmit)="saveReturn(returnForm)">
          <div class="row g-4">
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Return Number</label>
              <input type="text" class="form-control" [(ngModel)]="returnData.returnNumber" name="returnNumber" required readonly />
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Product</label>
              <select class="form-select" [(ngModel)]="returnData.product" name="product" required>
                <option value="">Select Product</option>
                <option *ngFor="let p of products" [value]="p.name">{{ p.name }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-muted fs-7">Quantity</label>
              <input type="number" class="form-control" [(ngModel)]="returnData.quantity" name="quantity" min="1" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-muted fs-7">Return Date</label>
              <input type="date" class="form-control" [(ngModel)]="returnData.date" name="date" required />
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Reason for Return</label>
              <select class="form-select" [(ngModel)]="returnData.reason" name="reason" required>
                <option *ngFor="let r of reasons" [value]="r">{{ r }}</option>
              </select>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-5 pt-3 border-top">
            <button type="button" class="btn btn-light px-4" (click)="closeReturnModal()">Discard</button>
            <button type="submit" class="btn btn-primary px-5 shadow-sm">Save Return</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
