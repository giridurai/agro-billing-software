<div class="container-fluid py-4 px-3">
  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold text-dark mb-1">Firm System Settings</h4>
    </div>
  </div>

  <div class="row g-4">
    <!-- LEFT: Agro Agency Profile -->
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <div class="d-flex align-items-center gap-2 mb-4">
            <i class="mdi mdi-office-building text-success fs-4"></i>
            <h5 class="mb-0 fw-bold text-dark fs-6">Agro Agency Profile</h5>
          </div>

          <div class="mb-3">
            <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Official Firm / Trade Name *</label>
            <input type="text" class="form-control form-control-sm" [(ngModel)]="settings.firmName" name="firmName" placeholder="e.g. Shree Balaji Agro" required />
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Firm GSTIN Number *</label>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="settings.gstin" name="gstin" placeholder="37ABCFG1234F1Z9" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Fertilizer License No *</label>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="settings.fertilizerLicense" name="fertilizerLicense" placeholder="AP-FERT-2026-992" required />
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Contact Phone *</label>
              <input type="text" class="form-control form-control-sm" [(ngModel)]="settings.phone" name="phone" placeholder="+91 94401 12233" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Email ID</label>
              <input type="email" class="form-control form-control-sm" [(ngModel)]="settings.email" name="email" placeholder="contact@balajiagro.com" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Outlet Address Location</label>
            <textarea class="form-control form-control-sm" [(ngModel)]="settings.address" name="address" rows="4" placeholder="Guntur Market Yard, Andhra Pradesh, 522001"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Filing & Billing Series Prefixes -->
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4 d-flex flex-column justify-content-between">
          <div>
            <div class="d-flex align-items-center gap-2 mb-4">
              <i class="mdi mdi-tune text-success fs-4"></i>
              <h5 class="mb-0 fw-bold text-dark fs-6">Filing & Billing Series Prefixes</h5>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Active Financial Year *</label>
                <select class="form-select form-select-sm" [(ngModel)]="settings.financialYear" name="financialYear">
                  <option value="F.Y. 2026 - 2027">F.Y. 2026 - 2027</option>
                  <option value="F.Y. 2025 - 2026">F.Y. 2025 - 2026</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fs-8 fw-bold text-success" style="text-transform: none; letter-spacing: normal;">Rounding Rule Mode</label>
                <select class="form-select form-select-sm" [(ngModel)]="settings.roundingMode" name="roundingMode">
                  <option value="Auto Nearest ₹1 (Standard)">Auto Nearest ₹1 (Standard)</option>
                  <option value="No Rounding">No Rounding</option>
                </select>
              </div>
            </div>

            <!-- Invoice Sequence -->
            <div class="bg-light p-3 rounded-3 mb-3 border">
              <div class="fs-9 fw-bold text-muted mb-2 text-uppercase">Invoice Sequence</div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fs-9 text-muted" style="text-transform: none; letter-spacing: normal;">Prefix String</label>
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.invoicePrefix" name="invoicePrefix" placeholder="INV-26-" />
                </div>
                <div class="col-md-6">
                  <label class="form-label fs-9 text-muted" style="text-transform: none; letter-spacing: normal;">Next Serial Index</label>
                  <input type="number" class="form-control form-control-sm bg-white" [(ngModel)]="settings.invoiceNextIndex" name="invoiceNextIndex" />
                </div>
              </div>
            </div>

            <!-- Quotation Sequence -->
            <div class="bg-light p-3 rounded-3 mb-3 border">
              <div class="fs-9 fw-bold text-muted mb-2 text-uppercase">Quotation Sequence</div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fs-9 text-muted" style="text-transform: none; letter-spacing: normal;">Prefix String</label>
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.quotationPrefix" name="quotationPrefix" placeholder="QUO-26-" />
                </div>
                <div class="col-md-6">
                  <label class="form-label fs-9 text-muted" style="text-transform: none; letter-spacing: normal;">Next Serial Index</label>
                  <input type="number" class="form-control form-control-sm bg-white" [(ngModel)]="settings.quotationNextIndex" name="quotationNextIndex" />
                </div>
              </div>
            </div>

            <!-- Bank Details -->
            <div class="bg-light p-3 rounded-3 mb-4 border">
              <div class="fs-9 fw-bold text-muted mb-2 text-uppercase">Bank Details for Receipts Footer</div>
              <div class="row g-3 mb-2">
                <div class="col-md-6">
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.bankName" name="bankName" placeholder="Bank Name" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.bankAccount" name="bankAccount" placeholder="Account Number" />
                </div>
              </div>
              <div class="row g-3">
                <div class="col-md-6">
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.bankIfsc" name="bankIfsc" placeholder="IFSC Code" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control form-control-sm bg-white" [(ngModel)]="settings.bankBranch" name="bankBranch" placeholder="Branch Name" />
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-3 pt-3 border-top mt-4">
            <button type="button" class="btn btn-outline-secondary btn-sm px-4 py-2" (click)="discardChanges()">Discard changes</button>
            <button type="button" class="btn btn-success btn-sm px-4 py-2 text-white fw-bold shadow-sm" (click)="applyConfigurations()">
              Apply Configurations
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
