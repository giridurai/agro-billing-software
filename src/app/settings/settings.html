<div class="settings-container px-2">
  <div class="page-header mb-4 pb-2 border-bottom d-flex justify-content-between align-items-center">
    <div>
      <h3 class="fw-bold text-dark mb-1">System Settings</h3>
      <p class="text-muted fs-8 mb-0">Manage your application preferences, configurations, and security.</p>
    </div>
    <button class="btn btn-primary btn-sm rounded-pill px-4 shadow-sm">
      <i class="mdi mdi-content-save-outline me-1"></i> Save Changes
    </button>
  </div>

  <!-- Color Mode Section -->
  <div class="mb-5">
    <h6 class="fw-bold text-dark mb-3" [class.text-white]="themeService.getTheme() === 'dark'">Color mode</h6>
    <div class="row g-3" style="max-width: 500px;">
      <div class="col-12">
        <div class="p-3 rounded-4 border d-flex align-items-center justify-content-between theme-select-box active" 
             [class.active]="themeService.getTheme() === 'light'"
             (click)="themeService.setTheme('light')"
             style="cursor: pointer; transition: all 0.2s;"
             [style.border-color]="themeService.getTheme() === 'light' ? '#2563eb' : ''"
             [style.background]="themeService.getTheme() === 'light' ? '#eff6ff' : ''">
          <div class="d-flex align-items-center gap-3">
            <div class="icon-circle bg-white shadow-sm rounded-3 d-flex align-items-center justify-content-center" style="width: 44px; height: 44px;">
              <i class="mdi mdi-white-balance-sunny text-primary fs-4"></i>
            </div>
            <div>
              <h6 class="mb-0 fw-bold fs-7" [class.text-dark]="themeService.getTheme() === 'light'">Light theme</h6>
              <p class="mb-0 text-muted fs-8">Set light theme or reset to default</p>
            </div>
          </div>
          <div class="radio-outer rounded-circle border d-flex align-items-center justify-content-center" 
               style="width: 22px; height: 22px;"
               [style.border-color]="themeService.getTheme() === 'light' ? '#2563eb' : ''">
            <div *ngIf="themeService.getTheme() === 'light'" class="radio-inner rounded-circle bg-primary" style="width: 12px; height: 12px;"></div>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="p-3 rounded-4 border d-flex align-items-center justify-content-between theme-select-box" 
             [class.active]="themeService.getTheme() === 'dark'"
             (click)="themeService.setTheme('dark')"
             style="cursor: pointer; transition: all 0.2s;"
             [style.border-color]="themeService.getTheme() === 'dark' ? '#2563eb' : ''"
             [style.background]="themeService.getTheme() === 'dark' ? '#1e293b' : ''">
          <div class="d-flex align-items-center gap-3">
            <div class="icon-circle rounded-3 d-flex align-items-center justify-content-center" 
                 [style.background]="themeService.getTheme() === 'dark' ? '#334155' : '#f8f9fa'"
                 style="width: 44px; height: 44px;">
              <i class="mdi mdi-weather-night fs-4" [class.text-primary]="themeService.getTheme() === 'dark'"></i>
            </div>
            <div>
              <h6 class="mb-0 fw-bold fs-7" [class.text-white]="themeService.getTheme() === 'dark'">Dark theme</h6>
              <p class="mb-0 text-muted fs-8">Switch to dark theme</p>
            </div>
          </div>
          <div class="radio-outer rounded-circle border d-flex align-items-center justify-content-center" 
               style="width: 22px; height: 22px;"
               [style.border-color]="themeService.getTheme() === 'dark' ? '#2563eb' : ''">
            <div *ngIf="themeService.getTheme() === 'dark'" class="radio-inner rounded-circle bg-primary" style="width: 12px; height: 12px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4 pb-4">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let card of settingsCards">
      <div class="setting-card card h-100 border-0 transition-all">
        <div class="card-body p-4">
          <div class="d-flex align-items-start gap-3">
            <div class="icon-box rounded-circle d-flex align-items-center justify-content-center bg-{{card.color}}-subtle text-{{card.color}}" style="width: 54px; height: 54px; flex-shrink: 0;">
              <i class="mdi {{card.icon}} fs-3"></i>
            </div>
            <div>
              <h6 class="fw-bold mb-2 text-dark fs-7">{{ card.title }}</h6>
              <p class="text-muted fs-8 mb-0" style="line-height: 1.5;">{{ card.description }}</p>
            </div>
          </div>
        </div>
        <div class="card-footer bg-transparent border-0 px-4 pb-4 pt-0 mt-auto text-end">
          <a href="#" class="text-{{card.color}} fw-bold fs-8 text-decoration-none d-inline-flex align-items-center gap-1 configure-link">
            Configure <i class="mdi mdi-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
