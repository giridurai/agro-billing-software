<div class="container-fluid py-4 px-3">
  <!-- Stock Outward Card -->
  <div class="crm-card">
    <div class="crm-card-header">
      <div class="row align-items-center g-3">
        <div class="col-md-auto">
          <h6 class="mb-0 fw-bold text-main">Stock Outward Records</h6>
        </div>
        <div class="col-md">
          <div class="stylish-search float-end" style="max-width: 400px">
            <i class="mdi mdi-magnify"></i>
            <input
              type="text"
              class="form-control ps-5"
              placeholder="Search by product name..."
              [(ngModel)]="searchText"
              name="searchText"
            />
          </div>
        </div>
        <div class="col-md-auto">
          <button
            class="btn btn-primary d-flex align-items-center shadow-sm btn-sm fw-bold px-3 py-2"
            (click)="$event.stopPropagation(); openModal()"
          >
            <i class="mdi mdi-minus-box me-2"></i> ADD OUTWARD STOCK
          </button>
        </div>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="crm-table">
          <thead>
            <tr>
              <th>Entry ID</th>
              <th>Product Name</th>
              <th>Quantity Dispatched</th>
              <th>Outward Date</th>
              <th>Notes / Remarks</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let rec of filteredRecords; let i = index">
              <td>
                <span class="fw-semibold text-main">#OUT-{{ rec.id }}</span>
              </td>
              <td>
                <div class="d-flex align-items-center">
                  <div
                    class="company-avatar me-3 bg-danger-subtle text-danger rounded d-flex align-items-center justify-content-center"
                    style="width: 32px; height: 32px"
                  >
                    <i class="mdi mdi-arrow-up-bold-circle fs-6"></i>
                  </div>
                  <div>
                    <span class="fw-semibold text-main">{{ rec.product }}</span>
                  </div>
                </div>
              </td>
              <td>
                <span class="badge-crm badge-crm-danger">-{{ rec.quantity }}</span>
              </td>
              <td>
                <span class="text-muted fs-7">{{ rec.date }}</span>
              </td>
              <td>
                <span class="text-muted fs-7">{{ rec.notes || 'N/A' }}</span>
              </td>
              <td class="text-end pe-4">
                <button class="btn btn-outline-danger btn-sm border-0 p-1" (click)="deleteRecord(rec.id)">
                  <i class="mdi mdi-delete-outline fs-5"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filteredRecords.length === 0">
              <td colspan="6" class="text-center py-5 text-muted">
                <i class="mdi mdi-database-minus-outline fs-1 d-block mb-2 opacity-25"></i>
                No stock outward logs found.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Outward Modal -->
<div id="stockOutwardModal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-bottom py-3">
        <h5 class="modal-title fw-bold">
          <i class="mdi mdi-arrow-up-bold-circle me-2 text-danger"></i>
          Record Stock Outward (Dispatch)
        </h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form #stockForm="ngForm" (ngSubmit)="saveRecord(stockForm)">
          <div class="row g-4">
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Product Name</label>
              <select class="form-select" [(ngModel)]="recordData.product" name="product" required>
                <option value="">Select Product</option>
                <option *ngFor="let p of products" [value]="p.name">{{ p.name }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-muted fs-7">Quantity Dispatched</label>
              <input type="number" class="form-control" [(ngModel)]="recordData.quantity" name="quantity" min="1" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-muted fs-7">Dispatch Date</label>
              <input type="date" class="form-control" [(ngModel)]="recordData.date" name="date" required />
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Notes / Remarks</label>
              <textarea class="form-control" [(ngModel)]="recordData.notes" name="notes" rows="2" placeholder="e.g. Sent for cooperative distribution..."></textarea>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-5 pt-3 border-top">
            <button type="button" class="btn btn-light px-4" (click)="closeModal()">Discard</button>
            <button type="submit" class="btn btn-primary px-5 shadow-sm">Record Entry</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
