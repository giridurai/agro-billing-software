<div class="container-fluid py-4 px-3">
  <!-- Warehouse Card -->
  <div class="crm-card">
    <div class="crm-card-header">
      <div class="row align-items-center g-3">
        <div class="col-md-auto">
          <h6 class="mb-0 fw-bold text-main">Warehouse Registry</h6>
        </div>
        <div class="col-md">
          <div class="stylish-search float-end" style="max-width: 400px">
            <i class="mdi mdi-magnify"></i>
            <input
              type="text"
              class="form-control ps-5"
              placeholder="Search by warehouse name or location..."
              [(ngModel)]="searchText"
              name="searchText"
            />
          </div>
        </div>
        <div class="col-md-auto">
          <button
            class="btn btn-primary d-flex align-items-center shadow-sm btn-sm fw-bold px-3 py-2"
            (click)="$event.stopPropagation(); openModal()"
          >
            <i class="mdi mdi-plus-box me-2"></i> ADD WAREHOUSE
          </button>
        </div>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="crm-table">
          <thead>
            <tr>
              <th>Warehouse Name</th>
              <th>Location</th>
              <th>Capacity (Bags / Units)</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let w of filteredWarehouses; let i = index">
              <td>
                <div class="d-flex align-items-center">
                  <div
                    class="company-avatar me-3 bg-primary-subtle text-primary rounded d-flex align-items-center justify-content-center"
                    style="width: 32px; height: 32px"
                  >
                    <i class="mdi mdi-warehouse fs-6"></i>
                  </div>
                  <div>
                    <span class="fw-semibold text-main">{{ w.warehouseName }}</span>
                    <span class="text-muted fs-8 d-block">ID: #{{ w.id }}</span>
                  </div>
                </div>
              </td>
              <td>
                <span class="text-muted fs-7">{{ w.location }}</span>
              </td>
              <td>
                <span class="badge-crm badge-crm-info">{{ w.capacity | number }} Units</span>
              </td>
              <td class="text-end pe-4">
                <button class="btn btn-outline-warning btn-sm border-0 p-1 me-1" (click)="editWarehouse(w)">
                  <i class="mdi mdi-pencil-outline fs-5"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm border-0 p-1" (click)="deleteWarehouse(w.id)">
                  <i class="mdi mdi-delete-outline fs-5"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filteredWarehouses.length === 0">
              <td colspan="4" class="text-center py-5 text-muted">
                <i class="mdi mdi-warehouse-off fs-1 d-block mb-2 opacity-25"></i>
                No warehouses registered.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Warehouse Modal -->
<div id="warehouseModal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-bottom py-3">
        <h5 class="modal-title fw-bold">
          <i class="mdi mdi-warehouse me-2 text-primary"></i>
          {{ selectedWarehouse ? 'Edit Warehouse Details' : 'Register New Warehouse' }}
        </h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body p-4">
        <form #warehouseForm="ngForm" (ngSubmit)="saveWarehouse(warehouseForm)">
          <div class="row g-4">
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Warehouse Name</label>
              <input type="text" class="form-control" [(ngModel)]="warehouseData.warehouseName" name="warehouseName" placeholder="e.g. Fertilizer Storage B" required />
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Location Address</label>
              <input type="text" class="form-control" [(ngModel)]="warehouseData.location" name="location" placeholder="e.g. Mandya Hub, Phase 2" required />
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-muted fs-7">Capacity (Units / Bags)</label>
              <input type="number" class="form-control" [(ngModel)]="warehouseData.capacity" name="capacity" min="100" required />
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-5 pt-3 border-top">
            <button type="button" class="btn btn-light px-4" (click)="closeModal()">Discard</button>
            <button type="submit" class="btn btn-primary px-5 shadow-sm">Save Warehouse</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
